<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Game Tracker</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #1a1a1d; color: white; margin-top: 40px; }
        .container { background: #25252b; padding: 30px; border-radius: 20px; display: inline-block; box-shadow: 0 10px 40px rgba(0,0,0,0.6); width: 350px; }
        
        #gameIcon { width: 120px; height: 120px; border-radius: 20px; margin-bottom: 15px; display: none; border: 3px solid #333; }
        #gameName { font-size: 1.4rem; margin: 10px 0; font-weight: bold; color: #fff; }
        
        input { padding: 12px; border-radius: 8px; border: none; width: 80%; margin-bottom: 15px; background: #333; color: white; text-align: center; }
        button { padding: 12px 30px; border-radius: 8px; border: none; background: #0084ff; color: white; cursor: pointer; font-weight: bold; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        
        #result { font-size: 1.8rem; color: #00ffa3; margin-top: 10px; }
        #cooldown { color: #ff9f43; font-size: 0.85rem; margin-top: 8px; height: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <img id="gameIcon" src="" alt="Game Icon">
        <div id="gameName">Roblox Tracker</div>
        
        <input type="text" id="idInput" placeholder="Paste Place ID">
        <br>
        <button id="btn" onclick="fetchGameData()">Check Game</button>
        <div id="cooldown"></div>
        <div id="result">Ready</div>
    </div>

    <script>
        const PROXY = "https://corsproxy.io/?";
        let timer;

        async function fetchGameData() {
            const input = document.getElementById("idInput").value.trim();
            const res = document.getElementById("result");
            const btn = document.getElementById("btn");
            const nameEl = document.getElementById("gameName");
            const iconEl = document.getElementById("gameIcon");

            if (!input) return res.innerText = "Enter an ID";

            res.innerText = "Connecting...";
            btn.disabled = true;

            try {
                // 1. Convert Place ID to Universe ID
                const convUrl = `${PROXY}${encodeURIComponent(`https://apis.roblox.com/universes/v1/places/${input}/universe`)}`;
                const convRes = await fetch(convUrl);
                const convData = await convRes.json();
                const universeId = convData.universeId;

                if (!universeId) throw new Error("Invalid ID");

                // 2. Fetch Game Name (FORCING ENGLISH LOCALE)
                // We add &locale=en_us to the URL
                const gameUrl = `${PROXY}${encodeURIComponent(`https://games.roblox.com/v1/games?universeIds=${universeId}`)}`;
                const gameRes = await fetch(gameUrl);
                const gameData = await gameRes.json();
                const gameInfo = gameData.data[0];

                // 3. Fetch Game Icon
                const iconUrl = `${PROXY}${encodeURIComponent(`https://thumbnails.roblox.com/v1/games/icons?universeIds=${universeId}&size=150x150&format=Png`)}`;
                const iconRes = await fetch(iconUrl);
                const iconData = await iconRes.json();

                // Update UI - Check if game has a specific English name property or just use name
                nameEl.innerText = gameInfo.name; 
                res.innerText = gameInfo.playing.toLocaleString() + " Players";
                
                if (iconData.data && iconData.data[0]) {
                    iconEl.src = iconData.data[0].imageUrl;
                    iconEl.style.display = "inline-block";
                }

                startCooldown(60);

            } catch (e) {
                res.innerText = "Game Not Found";
                btn.disabled = false;
                iconEl.style.display = "none";
                nameEl.innerText = "Error";
            }
        }

        function startCooldown(seconds) {
            const btn = document.getElementById("btn");
            const cool = document.getElementById("cooldown");
            let remaining = seconds;
            
            timer = setInterval(() => {
                remaining--;
                if (remaining <= 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    cool.innerText = "";
                } else {
                    cool.innerText = `Wait ${remaining}s to update`;
                }
            }, 1000);
        }
    </script>
</body>
</html>
