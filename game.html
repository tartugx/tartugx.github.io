<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Player Counter</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            background-color: #f4f4f9;
            color: #333;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            min-width: 320px;
        }
        input {
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 80%;
            margin-bottom: 15px;
            outline: none;
        }
        button {
            padding: 10px 25px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:disabled {
            background-color: #a0a0a0;
            cursor: not-allowed;
        }
        #result {
            margin-top: 20px;
            font-size: 1.4rem;
            color: #2c3e50;
        }
        #cooldownText {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #e67e22;
            height: 20px; /* Prevents layout jump */
        }
        .error { color: #dc3545 !important; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Roblox Players</h1>
        <p>Enter Universe ID</p>
        
        <input type="number" id="gameId" placeholder="e.g. 1104443913">
        <br>
        <button id="checkBtn" onclick="getPlayers()">Check Players</button>

        <div id="cooldownText"></div>
        <h2 id="result">Ready</h2>
    </div>

    <script>
        let lastRequestTime = 0;
        const cooldownMs = 60000; // 1 minute in milliseconds
        let timerInterval;

        async function getPlayers() {
            const id = document.getElementById("gameId").value.trim();
            const resultElement = document.getElementById("result");
            const btn = document.getElementById("checkBtn");
            const cooldownDisplay = document.getElementById("cooldownText");

            const currentTime = Date.now();
            const timePassed = currentTime - lastRequestTime;

            // 1. Check if cooldown is active
            if (timePassed < cooldownMs) {
                const timeLeft = Math.ceil((cooldownMs - timePassed) / 1000);
                resultElement.innerText = "Too fast!";
                return;
            }

            if (!id) {
                resultElement.innerText = "Enter a Universe ID";
                resultElement.className = "error";
                return;
            }

            // 2. Clear errors and set loading state
            resultElement.innerText = "Fetching...";
            resultElement.className = "";
            btn.disabled = true;

            try {
                const proxyUrl = "https://corsproxy.io/?";
                const targetUrl = `https://games.roblox.com/v1/games?universeIds=${id}`;
                
                const response = await fetch(proxyUrl + encodeURIComponent(targetUrl));
                const data = await response.json();

                if (data.data && data.data.length > 0) {
                    const playerCount = data.data[0].playing;
                    resultElement.innerText = playerCount.toLocaleString() + " players online";
                    
                    // 3. Update last successful request time
                    lastRequestTime = Date.now();
                    startCooldownTimer(cooldownMs / 1000);
                    
                } else {
                    resultElement.innerText = "ID not found!";
                    resultElement.className = "error";
                    btn.disabled = false;
                }

            } catch (e) {
                resultElement.innerText = "Error fetching data";
                resultElement.className = "error";
                btn.disabled = false;
            }
        }

        function startCooldownTimer(seconds) {
            const btn = document.getElementById("checkBtn");
            const cooldownDisplay = document.getElementById("cooldownText");
            
            let remaining = seconds;
            
            btn.disabled = true;
            
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                remaining--;
                if (remaining <= 0) {
                    clearInterval(timerInterval);
                    btn.disabled = false;
                    cooldownDisplay.innerText = "";
                } else {
                    cooldownDisplay.innerText = `Cooldown: ${remaining}s remaining`;
                }
            }, 1000);
        }
    </script>

</body>
</html>
