<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Player Counter</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; margin-top: 50px; background: #1a1a1d; color: white; }
        .container { background: #25252b; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { padding: 12px; border-radius: 5px; border: none; width: 250px; margin-bottom: 10px; font-size: 16px; }
        button { padding: 12px 25px; border-radius: 5px; border: none; background: #0084ff; color: white; cursor: pointer; font-weight: bold; }
        button:disabled { background: #555; cursor: not-allowed; }
        #result { font-size: 2rem; margin-top: 20px; color: #00ffa3; }
        #cooldown { color: #ff9f43; font-size: 0.9rem; margin-top: 5px; height: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Roblox Player Tracker</h1>
        <input type="text" id="idInput" placeholder="Paste Place ID or Universe ID">
        <br>
        <button id="btn" onclick="fetchData()">Check Status</button>
        <div id="cooldown"></div>
        <div id="result">Ready</div>
    </div>

    <script>
        const PROXY = "https://corsproxy.io/?";
        let timer;

        async function fetchData() {
            const input = document.getElementById("idInput").value.trim();
            const res = document.getElementById("result");
            const btn = document.getElementById("btn");
            const cool = document.getElementById("cooldown");

            if (!input) return res.innerText = "Enter an ID";

            res.innerText = "Finding Universe...";
            btn.disabled = true;

            try {
                // STEP 1: Convert Place ID to Universe ID automatically
                // This ensures that even if you use the URL ID, it still works.
                const convertUrl = `${PROXY}${encodeURIComponent(`https://apis.roblox.com/universes/v1/places/${input}/universe`)}`;
                const convResponse = await fetch(convertUrl);
                const convData = await convResponse.json();
                
                // If the ID was already a Universe ID, the converter might fail, 
                // so we fallback to using the original input.
                const universeId = convData.universeId || input;

                // STEP 2: Fetch player count
                const gameUrl = `${PROXY}${encodeURIComponent(`https://games.roblox.com/v1/games?universeIds=${universeId}`)}`;
                const gameResponse = await fetch(gameUrl);
                const gameData = await gameResponse.json();

                if (gameData.data && gameData.data.length > 0) {
                    const players = gameData.data[0].playing;
                    res.innerText = players.toLocaleString() + " Players";
                    startCooldown(60);
                } else {
                    res.innerText = "Invalid ID";
                    btn.disabled = false;
                }
            } catch (e) {
                res.innerText = "Error (Check ID)";
                btn.disabled = false;
            }
        }

        function startCooldown(seconds) {
            const btn = document.getElementById("btn");
            const cool = document.getElementById("cooldown");
            let remaining = seconds;
            
            timer = setInterval(() => {
                remaining--;
                if (remaining <= 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    cool.innerText = "";
                } else {
                    cool.innerText = `Wait ${remaining}s to refresh`;
                }
            }, 1000);
        }
    </script>
</body>
</html>
