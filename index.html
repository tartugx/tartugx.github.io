<!DOCTYPE html>
<html>
<head>
<title>Roblox Presence Tracker</title>
</head>

<body>
<h2>Roblox Presence Tracker</h2>
<p id="status">Checking...</p>

<script>
const userId = 489113887; // replace with Roblox user ID
let lastStatus = null;

const statusMap = {
    0: "Offline",
    1: "Online",
    2: "In Game",
    3: "In Roblox Studio"
};

async function checkPresence() {
    try {
        const response = await fetch("https://presence.roblox.com/v1/presence/users", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                userIds: [userId]
            })
        });

        const data = await response.json();
        const presence = data.userPresences[0].userPresenceType;

        if (presence !== lastStatus) {
            const statusText = statusMap[presence] || "Unknown";
            document.getElementById("status").innerText =
                "Status changed: " + statusText;
            console.log("Status changed:", statusText);
            lastStatus = presence;
        }

    } catch (err) {
        console.log("Error:", err);
    }
}

setInterval(checkPresence, 10000);
checkPresence();
</script>

</body>
</html>
