<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL // Roblox Presence</title>
    <style>
        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --accent: #58a6ff;
            --offline: #8b949e;
            --online: #3fb950;
            --ingame: #1f6feb;
            --studio: #d29922;
            --error: #f85149;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            /* Programming Font Stack */
            font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Source Code Pro', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 650px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        h2 { 
            margin-top: 0; 
            font-size: 1rem; 
            color: var(--accent); 
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
        }

        .input-group {
            margin: 20px 0;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        input {
            background: #000;
            border: 1px solid var(--border);
            color: var(--online);
            padding: 12px;
            border-radius: 6px;
            font-family: inherit;
            width: 200px;
            outline: none;
            transition: border 0.3s;
        }

        input:focus { border-color: var(--accent); }

        button {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active { transform: scale(0.95); }
        button:hover { opacity: 0.9; }

        #status-display {
            font-size: 2.5rem;
            margin: 30px 0;
            font-weight: 800;
            text-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        /* Status Coloring */
        .status-0 { color: var(--offline); }
        .status-1 { color: var(--online); }
        .status-2 { color: var(--ingame); }
        .status-3 { color: var(--studio); }

        /* Console styling */
        .console {
            background: #000;
            border: 1px solid var(--border);
            border-radius: 8px;
            height: 250px;
            overflow-y: auto;
            padding: 15px;
            text-align: left;
            font-size: 0.85rem;
            line-height: 1.5;
            display: flex;
            flex-direction: column-reverse; /* Keeps newest logs at top */
        }

        .log-entry {
            margin-bottom: 4px;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-5px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .log-time { color: #6e7681; margin-right: 12px; }
        .log-prefix { color: var(--accent); margin-right: 8px; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>&gt; ROBLOX_SIGNAL_DECODER</h2>
        
        <div class="input-group">
            <input type="number" id="userIdInput" value="489113887" placeholder="USER_ID">
            <button onclick="updateTarget()">CONNECT</button>
        </div>
        
        <div id="status-display" class="status-0">WAITING...</div>
        <div id="heartbeat" style="color: #6e7681; font-size: 0.75rem; letter-spacing: 1px;">IDLE</div>
    </div>

    <div class="console" id="console-log">
        <div class="log-entry">
            <span class="log-time">[SYSTEM]</span>
            <span class="log-prefix">::</span>
            <span>Awaiting connection to proxy...</span>
        </div>
    </div>
</div>

<script>
    /** * CONFIGURATION
     * Replace the URL below with your Cloudflare Worker URL.
     * Public proxies will fail with "Preflight CORS" errors.
     */
    const PROXY_URL = "https://YOUR_WORKER_URL.workers.dev"; 

    let currentUserId = document.getElementById("userIdInput").value;
    let lastStatus = null;
    let pollRate = 15000; // 15 seconds

    const statusLabels = {
        0: { text: "OFFLINE", class: "status-0" },
        1: { text: "ONLINE", class: "status-1" },
        2: { text: "IN_GAME", class: "status-2" },
        3: { text: "IN_STUDIO", class: "status-3" }
    };

    function addLog(msg, color = "#d1d5da") {
        const consoleEl = document.getElementById("console-log");
        const time = new Date().toLocaleTimeString('en-GB', { hour12: false });
        const div = document.createElement("div");
        div.className = "log-entry";
        div.innerHTML = `<span class="log-time">[${time}]</span><span class="log-prefix">>></span><span style="color: ${color}">${msg}</span>`;
        consoleEl.prepend(div);
    }

    async function checkPresence() {
        if (!currentUserId || PROXY_URL.includes("YOUR_WORKER_URL")) {
            if(PROXY_URL.includes("YOUR_WORKER_URL")) {
                addLog("ERROR: Proxy URL not set in script.", "#f85149");
            }
            return;
        }

        try {
            const response = await fetch(PROXY_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ userIds: [parseInt(currentUserId)] })
            });

            if (!response.ok) throw new Error(`HTTP_${response.status}`);

            const data = await response.json();
            const presence = data.userPresences[0];
            const type = presence.userPresenceType;

            // UI Update
            const display = document.getElementById("status-display");
            const meta = statusLabels[type] || { text: "UNKNOWN", class: "" };
            
            display.innerText = meta.text;
            display.className = meta.class;
            document.getElementById("heartbeat").innerText = `LAST_HEARTBEAT: ${new Date().toLocaleTimeString()}`;

            // Logging Logic
            if (type !== lastStatus) {
                const logColor = type === 0 ? "#8b949e" : (type === 1 ? "#3fb950" : "#58a6ff");
                addLog(`EVENT: Status changed to ${meta.text}`, logColor);
                lastStatus = type;
            }

        } catch (err) {
            addLog(`CRITICAL_FAILURE: ${err.message}`, "#f85149");
        }
    }

    function updateTarget() {
        const val = document.getElementById("userIdInput").value;
        if (val) {
            currentUserId = val;
            lastStatus = null;
            document.getElementById("console-log").innerHTML = ""; 
            addLog(`UPLINK: Established tracking for ID ${val}`, "#58a6ff");
            checkPresence();
        }
    }

    // Auto-refresh loop
    setInterval(checkPresence, pollRate);

    // Initial run
    addLog("SYSTEM: Terminal ready.");
    checkPresence();
</script>

</body>
</html>
