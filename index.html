<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Presence Tracker</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f4f4; }
        .card { background: white; padding: 20px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 15px; background: #00a2ff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0082cc; }
        #status { font-weight: bold; font-size: 1.2em; margin-top: 20px; }
        .Offline { color: #777; }
        .Online { color: #00e676; }
        .InGame { color: #00a2ff; }
        .Studio { color: #f68802; }
    </style>
</head>
<body>

<div class="card">
    <h2>Roblox Presence Tracker</h2>
    <input type="number" id="userIdInput" placeholder="Enter User ID" value="489113887">
    <button onclick="updateTarget()">Track User</button>
    
    <p id="status">Enter an ID to start</p>
    <p id="lastUpdate" style="font-size: 0.8em; color: #999;"></p>
</div>

<script>
let currentUserId = document.getElementById("userIdInput").value;
let lastStatus = null;
let intervalRef = null;

const statusMap = {
    0: { text: "Offline", class: "Offline" },
    1: { text: "Online", class: "Online" },
    2: { text: "In a Game", class: "InGame" },
    3: { text: "In Roblox Studio", class: "Studio" }
};

async function checkPresence() {
    if (!currentUserId) return;

    // We use a CORS proxy to bypass Roblox's browser restrictions
    const proxyUrl = "https://corsproxy.io/?";
    const apiUrl = "https://presence.roblox.com/v1/presence/users";

    try {
        const response = await fetch(proxyUrl + encodeURIComponent(apiUrl), {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ userIds: [parseInt(currentUserId)] })
        });

        if (!response.ok) throw new Error("API Limit or Proxy Error");

        const data = await response.json();
        const presenceData = data.userPresences[0];
        const statusType = presenceData.userPresenceType;

        const statusDisplay = document.getElementById("status");
        const info = statusMap[statusType] || { text: "Unknown", class: "" };

        statusDisplay.innerText = `Status: ${info.text}`;
        statusDisplay.className = info.class;
        
        document.getElementById("lastUpdate").innerText = "Last checked: " + new Date().toLocaleTimeString();
        
        if (statusType !== lastStatus) {
            console.log(`Status changed for ${currentUserId}:`, info.text);
            lastStatus = statusType;
        }

    } catch (err) {
        document.getElementById("status").innerText = "Error: Could not fetch data";
        console.error("Fetch error:", err);
    }
}

function updateTarget() {
    const input = document.getElementById("userIdInput").value;
    if (input) {
        currentUserId = input;
        lastStatus = null;
        document.getElementById("status").innerText = "Fetching...";
        checkPresence();
    }
}

// Check every 15 seconds (Roblox has strict rate limits)
if (intervalRef) clearInterval(intervalRef);
intervalRef = setInterval(checkPresence, 15000);

// Initial call
checkPresence();
</script>

</body>
</html>
